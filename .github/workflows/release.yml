name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach DMG to (e.g. v1.0.1). Leave empty for semantic-release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - run: bun run build

      - id: semantic
        if: inputs.tag == ''
        shell: bash
        run: |
          before_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          npx semantic-release
          after_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$after_tag" ] && [ "$after_tag" != "$before_tag" ]; then
            echo "tag=$after_tag" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: resolve-tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          SEMANTIC_TAG: ${{ steps.semantic.outputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid tag: $INPUT_TAG" >&2
              exit 1
            fi
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [ -n "$SEMANTIC_TAG" ]; then
            echo "tag=$SEMANTIC_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.resolve-tag.outputs.tag != ''
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.resolve-tag.outputs.tag }}
          releaseName: oorouter ${{ steps.resolve-tag.outputs.tag }}
          releaseBody: See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
